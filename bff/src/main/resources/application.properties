spring.application.name=bff
server.port=${SERVER_PORT:8080}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_B2C_ISSUER_URI:https://felipecabreracloudnative1.b2clogin.com/be8cdbec-1214-427f-aa13-56542dd2db99/v2.0/}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AZURE_B2C_JWKS_URI:https://felipecabreracloudnative1.b2clogin.com/felipecabreracloudnative1.onmicrosoft.com/B2C_1_app-cloudnative1/discovery/v2.0/keys}
logging.level.org.springframework.security=TRACE

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
logging.level.org.springframework.amqp=DEBUG

# URLs internas de los microservicios. En local apuntan a localhost;
# en Docker/AWS se sobreescriben con el nombre del contenedor (ver docker-compose).
ms.cursos.url=${MS_CURSOS_URL:http://localhost:8081}
ms.inscripciones.url=${MS_INSCRIPCIONES_URL:http://localhost:8082}
ms.storage.url=${MS_STORAGE_URL:http://localhost:8083}
