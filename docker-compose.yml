services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  ms-cursos:
    build:
      context: ./ms-cursos
    env_file:
      - .env
    ports:
      - "8081:8081"
    depends_on:
      - rabbitmq
    restart: unless-stopped

  ms-inscripciones:
    build:
      context: ./ms-inscripciones
    env_file:
      - .env
    ports:
      - "8082:8082"
    depends_on:
      - rabbitmq
    restart: unless-stopped

  ms-storage:
    build:
      context: ./ms-storage
    env_file:
      - .env
    ports:
      - "8083:8083"
    restart: unless-stopped

  bff:
    build:
      context: ./bff
    env_file:
      - .env
    environment:
      - RABBITMQ_HOST=rabbitmq
      - MS_CURSOS_URL=http://ms-cursos:8081
      - MS_INSCRIPCIONES_URL=http://ms-inscripciones:8082
      - MS_STORAGE_URL=http://ms-storage:8083
    ports:
      - "8080:8080"
    depends_on:
      - ms-cursos
      - ms-inscripciones
      - ms-storage
      - rabbitmq
    restart: unless-stopped